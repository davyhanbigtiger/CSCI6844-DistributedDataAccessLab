services:

  rabbitmq:
    container_name: rabbitmq
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  customerservice:
    container_name: customerservice
    build:
      context: ./CustomerService/CustomerService.Api
      dockerfile: Dockerfile
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    volumes:
      - ./data/customers:/app/data
    depends_on:
      rabbitmq:
        condition: service_healthy

  productservice:
    container_name: productservice
    build:
      context: ./ProductService/ProductService.Api
      dockerfile: Dockerfile
    ports:
      - "5003:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      RabbitMQ__Host: rabbitmq
    volumes:
      - ./data/products:/app/data
    depends_on:
      rabbitmq:
        condition: service_healthy

  orderservice:
    container_name: orderservice
    build:
      context: ./OrderService/OrderService.Api
      dockerfile: Dockerfile
    ports:
      - "5002:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      CustomerServiceUrl: http://customerservice:8080/
      ProductServiceUrl: http://productservice:8080/
      RabbitMQ__Host: rabbitmq
    volumes:
      - ./data/orders:/app/data
    depends_on:
      rabbitmq:
        condition: service_healthy
      customerservice:
        condition: service_started
      productservice:
        condition: service_started

  notificationservice:
    container_name: notificationservice
    build:
      context: ./NotificationService/NotificationService.Api
      dockerfile: Dockerfile
    ports:
      - "5004:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      RabbitMQ__Host: rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
